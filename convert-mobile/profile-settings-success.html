<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Saved - Figma Export</title>
    <style>
        :root {
            --primary: #10b981;
            --bg: #000000;
            --app-bg: #121212;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-label: #94a3b8;
            --border: #262626;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; min-height: 100vh; background-color: var(--app-bg); position: relative; padding-bottom: 90px; }
        header { padding: 32px 24px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .avatar-box { width: 72px; height: 72px; background: #262626; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2.5px solid var(--primary); }
        h1 { font-size: 1.4em; margin: 0; font-weight: 800; }
        .content { padding: 0 24px; display: flex; flex-direction: column; gap: 24px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        .btn-save { background: var(--primary); color: #000; padding: 16px; border-radius: 12px; border: none; font-weight: 800; }

        /* SweetAlert Popup UI */
        .swal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .swal-modal {
            background: #1a1a1a; width: 80%; border-radius: 24px; padding: 24px 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .swal-icon { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .swal-title { font-size: 1.3em; font-weight: 800; margin: 0 0 8px 0; }
        .swal-text { font-size: 0.9em; color: var(--text-label); margin-bottom: 20px; line-height: 1.5; }
        .swal-btn { background: var(--primary); color: #000; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 1em; }
        .avatar-box svg { width: 32px; height: 32px; }

        @media (min-width: 400px) { body { padding: 40px 0; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="avatar-box"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <h1>User Akun</h1>
        </header>

        <main class="content">
            <section class="card">
                <input type="text" value="User Akun Redesigned">
                <button class="btn-save">Update Profil</button>
            </section>
        </main>

        <!-- UI State: Success Popup -->
        <div class="swal-overlay">
            <div class="swal-modal">
                <div class="swal-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                <h2 class="swal-title">Profil Disimpan</h2>
                <p class="swal-text">Perubahan pada profil Anda telah berhasil disimpan ke sistem kami.</p>
                <button class="swal-btn" onclick="location.href='dashboard.html'">Mantap</button>
            </div>
        </div>
    </div>
</body>
</html>
