<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kost-Life v1 (Dark)</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #000000;
            --app-bg: #121212;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-label: #94a3b8;
            --border: #262626;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 400px; min-height: 100vh;
            background-color: var(--app-bg); position: relative;
            display: flex; flex-direction: column; padding-bottom: 90px;
        }

        header { padding: 32px 24px; }
        .welcome-msg { font-size: 0.9em; color: var(--text-label); margin: 0; }
        h1 { font-size: 1.8em; margin: 4px 0 0 0; font-weight: 800; }

        .content { padding: 0 24px; display: flex; flex-direction: column; gap: 24px; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }

        .balance-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none;
        }
        .balance-label { font-size: 0.85em; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .balance-amount { font-size: 2.4em; font-weight: 800; margin: 12px 0; display: block; }

        .budget-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
        .card-title { font-size: 1.1em; font-weight: 700; margin: 0; }
        .budget-meta { font-size: 0.85em; color: var(--text-label); text-align: right; line-height: 1.4; }

        .progress-container { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: var(--primary); border-radius: 6px; width: 65%; transition: width 0.5s ease; }

        .stats-placeholder {
            height: 160px; background: #0f172a; border: 2px dashed var(--border);
            border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-label); font-size: 0.9em; margin-top: 12px; gap: 8px;
        }

        .transaction-list { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        
        .transaction-item {
            display: flex; align-items: center; padding: 16px;
            background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border);
        }
        .tx-icon-box {
            width: 48px; height: 48px; background: #262626; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; margin-right: 16px;
        }
        .tx-details { flex: 1; }
        .tx-note { font-weight: 700; font-size: 1em; display: block; margin-bottom: 2px; }
        .tx-date { font-size: 0.8em; color: var(--text-label); }
        .tx-amount { font-weight: 800; font-size: 1.1em; }
        .tx-plus { color: var(--primary); }
        .tx-minus { color: #f87171; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 400px;
            height: 80px; background: rgba(26, 26, 26, 0.95);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); backdrop-filter: blur(10px); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-label); font-size: 0.75em; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 6px; }

        .nav-add-btn {
            background: var(--primary); width: 56px; height: 56px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #000; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
            margin-top: -45px; transition: transform 0.2s; border: 4px solid var(--app-bg);
        }
        .nav-add-btn:active { transform: scale(0.9); }

        @media (min-width: 400px) { body { padding: 40px 0; background-color: #0c0a09; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <p class="welcome-msg">Selamat pagi, User 👋</p>
            <h1>Dashboard</h1>
        </header>

        <main class="content">
            <div class="card balance-card">
                <span class="balance-label">Total Saldo</span>
                <span class="balance-amount">Rp 5.000.000</span>
                <div style="font-size: 0.85em; opacity: 0.9;">Estimasi: Rp 150.000 / hari</div>
            </div>

            <div class="card">
                <div class="budget-header">
                    <h3 class="card-title">Budget Tersisa</h3>
                    <div class="budget-meta">65% Terpakai<br>15 Hari Lagi</div>
                </div>
                <div class="progress-container"><div class="progress-bar"></div></div>
                <div class="stats-placeholder">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    Statistik Keuangan
                </div>
            </div>

            <section class="transaction-list">
                <div class="section-header">
                    <h3 class="card-title">Riwayat Terakhir</h3>
                    <a href="transactions.html" style="font-size: 0.85em; color: var(--primary); text-decoration: none; font-weight: 700;">Lihat Semua</a>
                </div>

                <div class="transaction-item">
                    <div class="tx-icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>
                    </div>
                    <div class="tx-details">
                        <span class="tx-note">Gaji Bulanan</span>
                        <span class="tx-date">Hari ini, 09:00</span>
                    </div>
                    <span class="tx-amount tx-plus">+10jt</span>
                </div>

                <div class="transaction-item">
                    <div class="tx-icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="tx-details">
                        <span class="tx-note">Bayar Kost</span>
                        <span class="tx-date">Kemarin, 11:00</span>
                    </div>
                    <span class="tx-amount tx-minus">-1.5jt</span>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a href="transactions.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                Transaksi
            </a>
            <a href="add-transaction.html" class="nav-add-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </a>
            <a href="budget-settings.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Budget
            </a>
            <a href="profile-settings.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
        </nav>
    </div>
</body>
</html>
