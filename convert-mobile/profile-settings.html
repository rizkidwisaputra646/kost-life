<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Kost-Life v1 (Dark)</title>
    <style>
        :root {
            --primary: #10b981;
            --bg: #000000;
            --app-bg: #121212;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-label: #94a3b8;
            --border: #262626;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; min-height: 100vh; background-color: var(--app-bg); position: relative; padding-bottom: 90px; }
        
        header { padding: 48px 24px 32px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .avatar-box {
            width: 90px; height: 90px; background: #262626; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: 3px solid var(--primary); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
        h1 { font-size: 1.5em; margin: 0; font-weight: 800; }

        .content { padding: 0 24px; display: flex; flex-direction: column; gap: 24px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        .card-title { font-size: 1.05em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 12px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85em; font-weight: 600; color: var(--text-label); }
        input { background: #262626; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; font-size: 0.95em; outline: none; }

        .btn-save { background: var(--primary); color: #000; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }
        .btn-logout { background: #450a0a; color: #f87171; padding: 16px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 400px; height: 80px; background: rgba(26, 26, 26, 0.95);
            display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-label); font-size: 0.75em; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 6px; }
        .nav-add-btn { background: var(--primary); width: 56px; height: 56px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; margin-top: -45px; border: 4px solid var(--app-bg); }

        @media (min-width: 400px) { body { padding: 40px 0; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="avatar-box">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h1>User Akun</h1>
            <p style="margin:0; color:var(--text-label); font-size:0.9em;">user@kost.life</p>
        </header>

        <main class="content">
            <section class="card">
                <div class="card-title">Data Pengguna</div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" value="User Akun">
                </div>
                <button class="btn-save">Update Profil</button>
            </section>

            <section class="card">
                <div class="card-title">Keamanan</div>
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" placeholder="Minimal 6 karakter">
                </div>
                <button class="btn-save">Ganti Password</button>
            </section>

            <button class="btn-logout" onclick="location.href='login.html'">Keluar Akun</button>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a href="transactions.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                Transaksi
            </a>
            <a href="add-transaction.html" class="nav-add-btn"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a>
            <a href="budget-settings.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Budget
            </a>
            <a href="profile-settings.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
        </nav>
    </div>
</body>
</html>
