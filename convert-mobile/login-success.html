<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success - Figma Export</title>
    <style>
        :root {
            --primary: #10b981;
            --bg: #000000;
            --app-bg: #121212;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-label: #94a3b8;
            --border: #262626;
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; padding: 40px 24px; background-color: var(--app-bg); display: flex; flex-direction: column; align-items: center; height: 100vh; position: relative; }

        header { text-align: center; margin-bottom: 32px; }
        .logo-box { width: 64px; height: 64px; background: #262626; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        h1 { font-size: 1.8em; margin: 0; font-weight: 800; color: #fff; }
        p.tagline { color: var(--text-label); font-size: 0.9em; margin-top: 4px; }

        .auth-card { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid var(--border); width: 100%; display: flex; flex-direction: column; gap: 16px; box-sizing: border-box; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85em; font-weight: 700; color: var(--text-label); }
        input { background: #262626; border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; font-size: 1em; outline: none; transition: 0.2s; }

        .btn-auth { background: var(--primary); color: #000; padding: 16px; border-radius: 12px; border: none; font-weight: 800; font-size: 1.05em; cursor: pointer; margin-top: 8px; }

        /* SweetAlert Popup UI */
        .swal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .swal-modal {
            background: #1a1a1a; width: 80%; border-radius: 24px; padding: 24px 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .swal-icon {
            width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--primary);
            display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
        }
        .swal-title { font-size: 1.3em; font-weight: 800; margin: 0 0 8px 0; }
        .swal-text { font-size: 0.9em; color: var(--text-label); margin-bottom: 20px; line-height: 1.5; }
        .swal-btn { background: var(--primary); color: #000; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 1em; cursor: pointer; }

        @media (min-width: 400px) { .app-container { border-radius: 32px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-box"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
            <h1>Kost-Life</h1>
            <p class="tagline">Pengelola Keuangan Kost Terbaik</p>
        </header>

        <form class="auth-card">
            <div class="form-group"><label>Email</label><input type="email" value="user@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" value="••••••••"></div>
            <button class="btn-auth">Masuk</button>
        </form>

        <!-- UI State: Success Popup -->
        <div class="swal-overlay">
            <div class="swal-modal">
                <div class="swal-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h2 class="swal-title">Berhasil Masuk!</h2>
                <p class="swal-text">Selamat datang kembali di Kost-Life. Data Anda sudah sinkron.</p>
                <button class="swal-btn" onclick="location.href='dashboard-success.html'">Lanjutkan</button>
            </div>
        </div>
    </div>
</body>
</html>
