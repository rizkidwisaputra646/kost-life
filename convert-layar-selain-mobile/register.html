<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Kost-Life Desktop</title>
    <style>
        :root { --primary: #10b981; --bg: #000; --app-bg: #121212; --card-bg: #1a1a1a; --text-main: #fff; --text-label: #94a3b8; --border: #262626; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-container { width: 100%; max-width: 450px; padding: 24px; box-sizing: border-box; }
        .logo-section { text-align: center; margin-bottom: 32px; }
        h1 { font-size: 2.2em; margin: 0; font-weight: 800; color: #fff; }
        p.tagline { color: var(--text-label); font-size: 1em; margin-top: 8px; }

        .auth-card { background: var(--card-bg); border-radius: 28px; padding: 40px; border: 1px solid var(--border); width: 100%; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.95em; font-weight: 700; color: var(--text-label); }
        input { background: #262626; border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; color: #fff; font-size: 1em; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }

        .btn-auth { background: var(--primary); color: #000; padding: 18px; border-radius: 14px; border: none; font-weight: 800; font-size: 1.1em; cursor: pointer; margin-top: 10px; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); transition: 0.2s; }
        .btn-auth:hover { transform: translateY(-2px); filter: brightness(1.05); }

        .auth-footer { margin-top: 32px; text-align: center; color: var(--text-label); font-size: 1em; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>
    <div class="auth-container">
        <header class="logo-section">
            <h1>Buat Akun 🌿</h1>
            <p class="tagline">Mulai kelola keuangan kost Anda hari ini.</p>
        </header>

        <form class="auth-card" action="login.html">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama Anda" required>
            </div>
            <div class="form-group">
                <label>Alamat Email</label>
                <input type="email" placeholder="nama@email.com" required>
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" placeholder="Min. 8 karakter" required>
            </div>
            <button type="submit" class="btn-auth">Daftar Akun Baru</button>
        </form>

        <div class="auth-footer">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
    </div>
</body>
</html>
