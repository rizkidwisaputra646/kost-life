<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Kost-Life Desktop</title>
    <style>
        :root { --primary: #10b981; --bg: #000; --app-bg: #121212; --card-bg: #1a1a1a; --text-main: #fff; --text-label: #94a3b8; --border: #262626; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); }
        
        .top-nav { position: sticky; top: 0; z-index: 100; height: 70px; background: rgba(26,26,26,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); width: 100%; display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 1100px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; font-weight: 800; font-size: 1.25em; }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-label); font-weight: 600; font-size: 0.95em; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .nav-link:hover, .nav-link.active { color: var(--primary); }
        .nav-icon { width: 18px; height: 18px; }

        .page-container { max-width: 1100px; margin: 60px auto; padding: 0 24px; display: flex; justify-content: center; }
        .form-card { background: var(--card-bg); width: 100%; max-width: 500px; padding: 40px; border-radius: 24px; border: 1px solid var(--border); }
        
        .profile-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .avatar-box { width: 100px; height: 100px; background: #262626; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid var(--primary); margin-bottom: 16px; position: relative; }
        .avatar-edit { position: absolute; bottom: 0; right: 0; background: var(--primary); width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; border: 3px solid var(--card-bg); cursor: pointer; }
        h1 { font-size: 1.8em; margin: 0; font-weight: 800; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
        .form-group label { font-size: 0.95em; font-weight: 700; color: var(--text-label); }
        input { background: #262626; border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; color: #fff; font-size: 1em; outline: none; }
        
        .btn-submit { background: var(--primary); color: #000; width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 800; font-size: 1.1em; cursor: pointer; margin-top: 12px; }
        .btn-logout { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 1em; cursor: pointer; margin-top: 24px; transition: 0.2s; }
        .btn-logout:hover { background: #7f1d1d; color: #fff; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-bg); width: 100%; max-width: 400px; padding: 40px 32px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .modal-icon { width: 70px; height: 70px; margin: 0 auto 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid var(--primary); }
        .modal-title { font-size: 1.6em; font-weight: 800; margin: 0 0 12px; }
        .modal-text { color: var(--text-label); font-size: 1em; line-height: 1.5; margin-bottom: 32px; }
        .swal-btn { background: var(--primary); color: #000; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; font-size: 1.1em; cursor: pointer; text-decoration: none; display: block; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Kost-Life Desktop
            </a>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
                <a href="transactions.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>Transaksi</a>
                <a href="budget-settings.html" class="nav-link"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Budget</a>
                <a href="profile-settings.html" class="nav-link active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profil</a>
                <a href="login.html" class="nav-link" style="color:#ef4444;"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <form class="form-card" onsubmit="event.preventDefault(); openModal();">
            <div class="profile-header">
                <div class="avatar-box">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <div class="avatar-edit"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></div>
                </div>
                <h1>Pengaturan Profil</h1>
            </div>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" value="User Kost-Life" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="user@mail.com" required>
            </div>
            <button type="submit" class="btn-submit">Simpan Perubahan</button>
            <button type="button" class="btn-logout" onclick="location.href='login.html'">Keluar Akun</button>
        </form>
    </div>

    <!-- Modal Success -->
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <h2 class="modal-title">Tersimpan!</h2>
            <p class="modal-text">Perubahan pada profil Anda telah berhasil diperbarui ke sistem.</p>
            <a href="dashboard.html" class="swal-btn">Selesai</a>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('successModal').style.display = 'flex'; }
    </script>
</body>
</html>
